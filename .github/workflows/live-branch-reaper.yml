name: Trusted live branch reaper

on:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: genie-live-branch-reaper-production
  cancel-in-progress: false

jobs:
  reap:
    environment: genie-production-control
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Reconcile exact disposable live branches
        env:
          GENIE_LIVE_BRANCH_REAPER_SCHEDULED: "true"
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: pnpm live-branch:reap
